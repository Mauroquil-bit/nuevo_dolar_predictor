name: Reporte diario dólar blue

on:
  schedule:
    # 12:00 UTC = 9:00 AM Argentina (ART = UTC-3)
    - cron: "0 12 * * 1-5"   # lunes a viernes
  workflow_dispatch:           # también se puede disparar a mano desde GitHub

jobs:
  generar-reporte:
    runs-on: ubuntu-latest
    permissions:
      contents: write          # necesario para hacer commit y push

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Actualizar precios del día
        run: python main.py --mode collect --no-twitter

      - name: Construir features y reentrenar modelo
        run: python main.py --mode train

      - name: Generar reporte HTML
        run: python generate_report.py

      - name: Commit y push del reporte actualizado
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html data/ models_saved/
          git diff --cached --quiet || git commit -m "Reporte diario $(date +'%d/%m/%Y')"
          git push
